# 1. إعدادات قاعدة البيانات PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "agristress"

---
# 2. إعدادات خدمة الذكاء الاصطناعي Vision (Python)
apiVersion: v1
kind: Service
metadata:
  name: vision
spec:
  selector:
    app: vision
  ports:
    - port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision
spec:
  replicas: 2 # بونص: التوفر العالي لخدمة الذكاء الاصطناعي
  selector:
    matchLabels:
      app: vision
  template:
    metadata:
      labels:
        app: vision
    spec:
      containers:
        - name: vision
          image: agristress-vision:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          # بونص: زيادة الرامات لـ 2 جيجا عشان مكتبات PyTorch الثقيلة
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
          # بونص: تصحيح فحص النبض ليتناسب مع خدمة البايثون (FastAPI)
          livenessProbe:
            httpGet:
              path: /docs # بايثون يستخدم /docs وليس /swagger
              port: 8000 # بايثون يعمل على 8000
            initialDelaySeconds: 60 # وقت كافٍ لتحميل موديل الـ AI
            periodSeconds: 20

---
# 3. إعدادات خدمة الإدارة API (.NET 10)
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3 # بونص: 3 نسخ لضمان عدم توقف النظام (High Availability)
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: agristress-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Host=db;Database=agristress;Username=postgres;Password=postgres"
          # بونص: موازنة موارد الـ .NET 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          # بونص: فحص نبض الـ API مع زيادة وقت الانتظار الأولي
          livenessProbe:
            httpGet:
              path: /swagger/index.html
              port: 8080
            initialDelaySeconds: 45 # وقت كافٍ لتشغيل الـ Migrations وقاعدة البيانات
            periodSeconds: 20
