version: "3.8"

services:
  # خدمة قاعدة البيانات
  db:
    image: postgres:15-alpine
    container_name: agristress_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: AgriStressDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # خدمة الدوت نت
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agristress_api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=AgriStressDb;Username=postgres;Password=admin

  # خدمة البايثون (AI)
  vision:
    build:
      context: ./VisionProcessingService
      dockerfile: Dockerfile
    container_name: agristress_vision
    ports:
      - "8000:8000"

volumes:
  postgres_data:
