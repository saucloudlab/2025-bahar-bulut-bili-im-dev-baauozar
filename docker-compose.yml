version: "3.8"

services:
  # 1. خدمة قاعدة البيانات
  db:
    image: postgres:15-alpine
    container_name: agristress_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: AgriStressDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. خدمة الإدارة API (.NET 10)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agristress_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=AgriStressDb;Username=postgres;Password=admin
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 3. خدمة الذكاء الاصطناعي Vision (Python)
  vision:
    build:
      context: ./VisionProcessingService
      dockerfile: Dockerfile
    container_name: agristress_vision
    restart: unless-stopped
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 4. خدمة المراقبة (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: agristress_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  # 5. خدمة عرض البيانات (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: agristress_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  postgres_data: